<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Register - MANAV SOLS</title>

<link rel="stylesheet" href="/style.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#07121f,#0c1c2c);
font-family:sans-serif;
}

.register-card{

width:400px;
padding:40px;
border-radius:14px;

background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);

box-shadow:0 0 25px rgba(0,255,255,0.08);

}

.logo{
text-align:center;
font-size:20px;
letter-spacing:2px;
color:white;
margin-bottom:10px;
}

.register-card h2{
text-align:center;
color:#22e3ff;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

.input-group input{

width:100%;
padding:12px;

border:none;
outline:none;

background:#0d1b2b;
border-radius:6px;
color:white;

}

.register-btn{

width:100%;
padding:12px;

background:#19d3e0;
border:none;

border-radius:6px;

color:black;
font-weight:bold;

cursor:pointer;

transition:.25s;

}

.register-btn:hover{
background:#0fb3be;
}

.login-link{
margin-top:18px;
text-align:center;
font-size:14px;
}

.login-link a{
color:#19d3e0;
text-decoration:none;
}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">MANAV SOLS</div>

<h2>Create Account</h2>

<form id="registerForm">

<div class="input-group">
<input type="text" id="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<button id="registerBtn" class="register-btn" type="button">
Register
</button>

</form>

<div class="login-link">
Already have an account?
<a href="/login/">Login</a>
</div>

</div>

<script type="module" src="/auth.js"></script>

</body>
</html>
