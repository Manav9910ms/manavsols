<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login - MANAV SOLS</title>

<link rel="stylesheet" href="/style.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#07121f,#0c1c2c);
font-family:sans-serif;
}

.login-card{

width:380px;
padding:40px;
border-radius:14px;

background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);

box-shadow:0 0 25px rgba(0,255,255,0.08);

}

.login-card h2{
text-align:center;
color:#22e3ff;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

.input-group input{

width:100%;
padding:12px;
border:none;
outline:none;

background:#0d1b2b;
border-radius:6px;
color:white;

}

.login-btn{

width:100%;
padding:12px;

background:#19d3e0;
border:none;

border-radius:6px;

color:black;
font-weight:bold;

cursor:pointer;

transition:.25s;

}

.login-btn:hover{
background:#0fb3be;
}

.register-link{

margin-top:18px;
text-align:center;
font-size:14px;

}

.register-link a{
color:#19d3e0;
text-decoration:none;
}

.logo{

text-align:center;
margin-bottom:15px;
font-size:20px;
color:white;
letter-spacing:2px;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">MANAV SOLS</div>

<h2>Login</h2>

<form id="loginForm">

<div class="input-group">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button class="login-btn">Login</button>

</form>

<div class="register-link">
Don't have an account?
<a href="/register/">Register</a>
</div>

</div>

<script type="module" src="/auth.js"></script>

</body>
</html>
