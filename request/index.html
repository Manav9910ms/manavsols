<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Service</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>
<section class="service-request">
  <h2>Request a Service</h2>
  <p>Tell me what you need and I will get back to you.</p>

  <form id="serviceForm">

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Mobile Number</label>
      <input type="tel" id="mobile" required>
    </div>

    <div class="form-group">
      <label>Service Needed</label>
      <select id="service" required>
        <option value="">Select Service</option>
        <option value="Web Development">Web Development</option>
        <option value="AI Automation">AI & Automation</option>
        <option value="Researched Content">Researched Content</option>
        <option value="Custom Project">Custom Project</option>
      </select>
    </div>

    <div class="form-group">
      <label>Your Budget</label>
      <input type="text" id="budget" placeholder="Example: ₹5000 - ₹20000">
    </div>

    <div class="form-group">
      <label>Project Description</label>
      <textarea id="description" rows="4" placeholder="Explain your idea or project"></textarea>
    </div>

    <button type="submit">Submit Request</button>

  </form>
</section>
<script type="module" src="/script.js"></script>
</body>
</html>
